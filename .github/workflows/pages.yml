name: Deploy Bilbao Daily PWA

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build daily digest
        run: |
          mkdir -p public/assets
          cat .github/build-digest-parts/*.b64 > build.b64
          node -e "const fs=require('fs'),zlib=require('zlib');const s=fs.readFileSync('build.b64','utf8').replace(/\\s+/g,'');fs.writeFileSync('build.mjs',zlib.gunzipSync(Buffer.from(s,'base64')))"
          node build.mjs
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
