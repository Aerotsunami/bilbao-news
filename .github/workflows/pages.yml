name: Deploy Bilbao Daily PWA

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Build daily digest
        run: |
          mkdir -p public/assets
          node --input-type=module <<'NODE'
          import { mkdir, writeFile } from "node:fs/promises";

          const sources = [
            ["Bizkaia Gaur", "https://www.bizkaiagaur.com/feed/", "Bizkaia"],
            ["EITB Noticias", "https://www.eitb.eus/es/rss/noticias/", "Регион"],
            ["Cadena SER Euskadi", "https://cadenaser.com/rss/euskadi.xml", "Регион"],
            ["Bilbao Secreto", "https://bilbaosecreto.com/feed/", "Город"]
          ];
          const now = new Date();
          const fmt = (opts) => new Intl.DateTimeFormat("ru-RU", { timeZone: "Europe/Madrid", ...opts }).format(now);
          const today = fmt({ dateStyle: "full" });
          const shortDate = fmt({ weekday: "short", day: "numeric", month: "long" }).replace(".", "");
          const updated = fmt({ dateStyle: "medium", timeStyle: "short" });
          const eventWords = "concierto kontzertu exposici festival teatro antzerki taller feria mercado agenda jornada curso charla musica música visita bbk live".split(" ");
          const attentionWords = "huelga paro corte cerrad aviso alerta trafico tráfico metro bilbobus renfe obras interrupci cancelad incidencia".split(" ");

          async function main() {
            await mkdir("public/assets", { recursive: true });
            const fallbackWeather = { temp: 0, min: 0, max: 0, rainChance: 0, rainMm: 0, wind: 0, label: "погода временно недоступна" };
            const [weather, rawItems] = await Promise.all([weatherNow().catch(() => fallbackWeather), feedItems()]);
            const picked = pickRecent(rawItems).slice(0, 16);
            const items = [];
            for (const item of picked) {
              const title = trimSentence(await ru(item.title), 120);
              const body = trimSentence(await ru(item.description || item.title), 340);
              items.push({ ...item, title: title || item.title, body: body || title || item.title });
            }

            const events = items.filter((item) => hasAny(item.raw, eventWords)).slice(0, 5);
            const eventUrls = new Set(events.map((item) => item.url));
            const itemAlerts = items.filter((item) => hasAny(item.raw, attentionWords)).slice(0, 4).map((item) => ({
              label: "Важно", severity: "medium", title: item.title, body: item.body, sourceName: item.sourceName, url: item.url
            }));
            const attention = [...weatherAlerts(weather), ...itemAlerts].slice(0, 6);
            const alertUrls = new Set(itemAlerts.map((item) => item.url));
            const news = items.filter((item) => !eventUrls.has(item.url) && !alertUrls.has(item.url)).slice(0, 8);

            await writeFile("public/index.html", html({ weather, news, events, attention }), "utf8");
            await writeFile("public/manifest.webmanifest", JSON.stringify(manifest(), null, 2), "utf8");
            await writeFile("public/sw.js", sw(), "utf8");
            await writeFile("public/assets/icon.svg", icon(), "utf8");
            await writeFile("public/.nojekyll", "", "utf8");
          }

          async function weatherNow() {
            const q = new URLSearchParams({
              latitude: "43.263",
              longitude: "-2.935",
              current: "temperature_2m,weather_code",
              daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_speed_10m_max",
              forecast_days: "1",
              timezone: "Europe/Madrid"
            });
            const data = await json("https://api.open-meteo.com/v1/forecast?" + q);
            const d = data.daily || {};
            const c = data.current || {};
            const code = Number((d.weather_code || [c.weather_code || 0])[0] || 0);
            return {
              temp: Math.round(Number(c.temperature_2m || 0)),
              min: Math.round(Number((d.temperature_2m_min || [0])[0] || 0)),
              max: Math.round(Number((d.temperature_2m_max || [0])[0] || 0)),
              rainChance: Math.round(Number((d.precipitation_probability_max || [0])[0] || 0)),
              rainMm: Number((d.precipitation_sum || [0])[0] || 0),
              wind: Math.round(Number((d.wind_speed_10m_max || [0])[0] || 0)),
              label: weatherLabel(code)
            };
          }

          async function feedItems() {
            const batches = await Promise.allSettled(sources.map(async ([name, url, category]) => {
              const xml = await text(url);
              return [...blocks(xml, "item"), ...blocks(xml, "entry")].map((block) => {
                const title = clean(tag(block, "title"));
                const description = clean(tag(block, "description") || tag(block, "summary") || tag(block, "content:encoded"));
                const link = clean(tag(block, "link")) || attr(block, "href");
                const when = clean(tag(block, "pubDate") || tag(block, "updated") || tag(block, "published"));
                const date = when ? new Date(when) : now;
                return { title, description, url: link, publishedAt: Number.isFinite(date.getTime()) ? date.toISOString() : now.toISOString(), sourceName: name, sourceUrl: url, category, raw: `${title} ${description}`.toLowerCase() };
              }).filter((item) => item.title && item.url);
            }));
            return batches.flatMap((batch) => batch.status === "fulfilled" ? batch.value : []);
          }

          async function text(url) {
            const res = await fetch(url, { headers: { "user-agent": "BilbaoDailyPWA/1.0", accept: "application/rss+xml, application/xml, text/xml, text/html" } });
            if (!res.ok) throw new Error(`${res.status} ${url}`);
            return res.text();
          }
          async function json(url) {
            const res = await fetch(url, { headers: { "user-agent": "BilbaoDailyPWA/1.0" } });
            if (!res.ok) throw new Error(`${res.status} ${url}`);
            return res.json();
          }

          function blocks(xml, name) {
            const out = [];
            const re = new RegExp(`<${name}\\b[\\s\\S]*?</${name}>`, "gi");
            let m;
            while ((m = re.exec(xml))) out.push(m[0]);
            return out;
          }
          function tag(block, name) {
            const re = new RegExp(`<${name}\\b[^>]*>([\\s\\S]*?)</${name}>`, "i");
            return block.match(re)?.[1] || "";
          }
          function attr(block, name) {
            return block.match(new RegExp(`${name}=["']([^"']+)["']`, "i"))?.[1] || "";
          }
          function clean(value) {
            return decode(String(value || "").replace(/<!\[CDATA\[|\]\]>/g, "").replace(/<[^>]+>/g, " ")).replace(/\s+/g, " ").trim();
          }
          function decode(value) {
            const map = { "&amp;": "&", "&lt;": "<", "&gt;": ">", "&quot;": "\"", "&#39;": "'", "&apos;": "'", "&nbsp;": " " };
            return value.replace(/&amp;|&lt;|&gt;|&quot;|&#39;|&apos;|&nbsp;/g, (x) => map[x] || x);
          }
          function pickRecent(items) {
            const seen = new Set();
            const sorted = items.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt)).filter((item) => {
              const key = item.url.split("?")[0];
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });
            const recent = sorted.filter((item) => now - new Date(item.publishedAt) < 10 * 86400000);
            return recent.length >= 6 ? recent : sorted;
          }
          const cache = new Map();
          async function ru(value) {
            const source = clean(value).slice(0, 700);
            if (!source || /[а-яё]/i.test(source)) return source;
            if (cache.has(source)) return cache.get(source);
            try {
              const data = await json("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ru&dt=t&q=" + encodeURIComponent(source));
              const translated = (data[0] || []).map((row) => row[0] || "").join("").trim() || source;
              cache.set(source, translated);
              return translated;
            } catch {
              return source;
            }
          }
          function trimSentence(value, max) {
            const v = clean(value);
            if (v.length <= max) return v;
            const cut = v.slice(0, max);
            const at = Math.max(cut.lastIndexOf(". "), cut.lastIndexOf("! "), cut.lastIndexOf("? "));
            return (at > 80 ? cut.slice(0, at + 1) : cut.slice(0, Math.max(cut.lastIndexOf(" "), 80))).trim() + "...";
          }
          function hasAny(text, words) {
            return words.some((word) => text.includes(word));
          }
          function weatherAlerts(w) {
            const out = [];
            if (w.rainChance >= 55 || w.rainMm >= 3) out.push({ label: "Дождь", severity: w.rainChance >= 75 || w.rainMm >= 8 ? "high" : "medium", title: "Возьми зонт", body: `Вероятность дождя ${w.rainChance}%, ожидается около ${w.rainMm} мм осадков.`, sourceName: "Open-Meteo", url: "https://open-meteo.com/" });
            if (w.wind >= 45) out.push({ label: "Ветер", severity: "medium", title: "Сильный ветер", body: `Порывы могут доходить до ${w.wind} км/ч. Лучше проверить транспорт и планы на улице.`, sourceName: "Open-Meteo", url: "https://open-meteo.com/" });
            return out;
          }
          function weatherLabel(code) {
            if ([0, 1].includes(code)) return "ясно";
            if ([2, 3].includes(code)) return "облачно";
            if ([45, 48].includes(code)) return "туман";
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return "дождь";
            if ([95, 96, 99].includes(code)) return "гроза";
            return "переменная погода";
          }
          function esc(value) {
            return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll("\"", "&quot;");
          }
          function card(item, cls = "card") {
            return `<article class="${cls}"><p class="meta">${esc(item.category || item.label || "Новость")} · ${esc(item.sourceName)}</p><h3>${esc(item.title)}</h3><p>${esc(item.body)}</p><a href="${esc(item.url)}">Источник</a></article>`;
          }
          function section(title, items, empty, cls) {
            return `<section><h2>${esc(title)}</h2><div class="grid">${items.length ? items.map((i) => card(i, cls)).join("") : `<p class="empty">${esc(empty)}</p>`}</div></section>`;
          }
          function html({ weather, news, events, attention }) {
            return `<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071016"><link rel="manifest" href="./manifest.webmanifest"><link rel="icon" href="./assets/icon.svg" type="image/svg+xml"><title>Bilbao Daily</title><style>${styles()}</style></head><body><main class="shell"><header class="hero"><div><p class="eyebrow">Bilbao / Bizkaia · ${esc(shortDate)}</p><h1>Дайджест</h1><p class="sub">Новости, дождь, события и важное — коротко по-русски.</p></div><button id="installBtn" hidden>Установить</button></header><section class="weather"><div><span class="label">Погода</span><strong>${weather.temp}°</strong><p>${esc(weather.label)}, ${weather.min}° / ${weather.max}°</p></div><div><span class="label">Дождь</span><strong>${weather.rainChance}%</strong><p>${weather.rainMm} мм</p></div><div><span class="label">Ветер</span><strong>${weather.wind}</strong><p>км/ч</p></div></section>${section("Требует внимания", attention, "Сейчас нет отдельных предупреждений.", "card attention")}${section("Мероприятия", events, "Пока не нашел свежих мероприятий в источниках.", "card event")}${section("Новости", news, "Пока нет свежих новостей в источниках.", "card")}<section class="sources"><h2>Источники</h2>${sources.map(([n, u]) => `<a href="${esc(u)}">${esc(n)}</a>`).join("")}<a href="https://open-meteo.com/">Open-Meteo</a></section><footer>Обновлено: ${esc(updated)}. Карточки короткие, но со ссылкой на первоисточник.</footer></main><script>if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js");let p;const b=document.getElementById("installBtn");window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();p=e;b.hidden=false});b.addEventListener("click",async()=>{if(!p)return;p.prompt();p=null;b.hidden=true});</script></body></html>`;
          }
          function manifest() {
            return { name: "Bilbao Daily", short_name: "Bilbao", start_url: "./", scope: "./", display: "standalone", background_color: "#071016", theme_color: "#071016", lang: "ru", icons: [{ src: "assets/icon.svg", sizes: "any", type: "image/svg+xml", purpose: "any maskable" }] };
          }
          function sw() {
            return `const C="bilbao-daily-v2",A=["./","./index.html","./manifest.webmanifest","./assets/icon.svg"];self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(A)).then(()=>self.skipWaiting())));self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request).then(r=>r||caches.match("./index.html"))))});`;
          }
          function icon() {
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#071016"/><path d="M112 318c42-95 92-143 150-143 54 0 96 39 138 117" fill="none" stroke="#53d6ff" stroke-width="34" stroke-linecap="round"/><path d="M123 347h266" stroke="#ffcf5a" stroke-width="34" stroke-linecap="round"/><circle cx="346" cy="156" r="42" fill="#ffcf5a"/></svg>`;
          }
          function styles() {
            return `:root{color-scheme:dark;--bg:#071016;--panel:#0d1a22;--text:#eef8ff;--muted:#98aebb;--line:#1f3a49;--blue:#53d6ff;--gold:#ffcf5a}*{box-sizing:border-box}body{margin:0;background:#071016;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text)}a{color:var(--blue);text-decoration:none}.shell{width:min(1120px,100%);margin:auto;padding:20px}.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:10px 0 12px}.eyebrow,.label,.meta{color:var(--muted);font-size:12px;letter-spacing:0;text-transform:uppercase}.hero h1{font-size:44px;line-height:1;margin:4px 0}.sub{max-width:620px;color:#c3d4dd;font-size:16px;margin:0}button{border:0;border-radius:8px;background:var(--gold);color:#071016;font-weight:800;padding:10px 14px}.weather{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:6px 0 20px}.weather>div,.card,.sources{background:#0d1a22;border:1px solid var(--line);border-radius:8px;padding:14px}.weather strong{display:block;font-size:32px;line-height:1;margin:5px 0}.weather p,.card p,footer{color:#c5d5dd}.weather p{font-size:14px;margin:0}section{margin:22px 0}h2{font-size:22px;margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{min-height:0}.card h3{font-size:18px;line-height:1.2;margin:6px 0}.card p{font-size:15px;line-height:1.35;margin:0 0 10px}.card a{font-size:14px}.attention{border-color:#6b4b25;background:#1a1812}.event{border-color:#214f5f}.empty{grid-column:1/-1;color:var(--muted);border:1px dashed var(--line);border-radius:8px;padding:12px}.sources{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.sources h2{width:100%;margin-bottom:0}footer{border-top:1px solid var(--line);padding:18px 0 34px}@media(max-width:720px){.shell{padding:12px}.hero{display:block;padding:8px 0 10px}.hero h1{font-size:34px}.sub{font-size:14px}.weather{gap:6px;margin:6px 0 16px}.weather>div{padding:10px}.weather strong{font-size:28px}.weather p{font-size:12px;line-height:1.25}.label,.meta{font-size:11px}.grid{grid-template-columns:1fr;gap:8px}section{margin:18px 0}h2{font-size:20px}.card{padding:12px}.card h3{font-size:16px}.card p{font-size:14px}}`;
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
